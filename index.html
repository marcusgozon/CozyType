<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CozyType</title>
  <link rel="icon" type="image/x-icon" href="coffee.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<div id="app">
  <div class="header">
    <div class="shop-name">CozyType🔆<span>type, relax, improve.</span></div>
    
    <div class="theme-container" style="font-family: 'JetBrains Mono', monospace; font-size: 11px; display: flex; align-items: center; gap: 6px;">
      <label for="theme-select" style="color: var(--fog); text-transform: uppercase; letter-spacing: 0.05em;">theme:</label>
      <select id="theme-select" style="background: var(--roast); color: var(--honey); border: 1px solid var(--mahogany); border-radius: 4px; padding: 4px 8px; cursor: pointer; outline: none;">
        <option value="cozy-dark">Cozy Dark</option>
        <option value="espresso-light">Espresso Light</option>
        <option value="sunset-orange">Sunset Orange</option>
        <option value="midnight-blue">Midnight Blue</option>
        <option value="forest-green">Forest Green</option>
        <option value="lavender-dream">Lavender Dream</option>
        <option value="cream-vanilla">Cream Vanilla</option>
        <option value="matrix">Matrix Green</option>
      </select>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-value" id="wpm-display">–</div>
        <div class="stat-label">wpm</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value" id="acc-display">–</div>
        <div class="stat-label">acc</div>
      </div>
      <div class="stat-divider"></div>
      <div class="timer-arc">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle cx="22" cy="22" r="18" fill="none" stroke="#3D2314" stroke-width="3"/>
          <circle id="timer-ring" cx="22" cy="22" r="18" fill="none" stroke="#C4874A" stroke-width="3"
            stroke-linecap="round" stroke-dasharray="113.1" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-center" id="timer-display">60</div>
      </div>
    </div>
  </div>

  <div class="main" id="main-area">
    <div class="difficulty-row">
      <span class="diff-label">Word Count</span>
      <button class="diff-btn active" data-diff="10">10</button>
      <button class="diff-btn" data-diff="25">25</button>
      <button class="diff-btn" data-diff="50">50</button>
      <button class="diff-btn" data-diff="100">100</button>
    </div>

    <div class="difficulty-row" style="margin-top: 14px; gap: 10px;">
      <span class="diff-label">Timer</span>
      <button class="timer-btn active" data-timer="60">1 min</button>
      <button class="timer-btn" data-timer="180">3 min</button>
      <button class="timer-btn" data-timer="300">5 min</button>
    </div>

    <div class="passage-label">type the text below</div>
    <div class="passage-wrap">
      <div class="passage-text" id="passage-display"></div>
    </div>

    <div class="input-area">
      <input id="typing-input" type="text" placeholder="start typing to begin…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="btn" id="reset-btn">retry</button>
    </div>

    <div id="vol-container" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #3D2314; opacity: 0.8;">
      <span>volume:</span>
      <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.8" style="accent-color: #C4874A; cursor: pointer; width: 120px;">
      <span id="vol-value">80%</span>
    </div>
  </div>

  <div class="result-overlay" id="result-area">
    <div class="steam-anim">⚡</div>
    <div class="result-title" id="result-title">W!</div>
    <div class="result-subtitle" id="result-sub">W in the Chat!</div>
    <div class="result-grid">
      <div class="result-card"><div class="val" id="r-wpm">–</div><div class="lbl">wpm</div></div>
      <div class="result-card"><div class="val" id="r-acc">–</div><div class="lbl">accuracy</div></div>
      <div class="result-card"><div class="val" id="r-chars">–</div><div class="lbl">chars</div></div>
    </div>
    <div class="result-prompt" id="result-prompt">press Enter to try again</div>
    <button class="btn" id="retry-btn" style="font-size:14px; padding: 11px 28px;">another round</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
